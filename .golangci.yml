version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - govet
    - unused
    - ineffassign
    - staticcheck
    - misspell

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  staticcheck:
    checks:
      - all
      - "-QF*"
      - "-S1016"

formatters:
  enable:
    - goimports
  goimports:
    local-prefixes: github.com/youruser/fortbyte

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
