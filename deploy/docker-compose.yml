services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8085:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MASTER_KEY: ${MASTER_KEY}
      LOG_LEVEL: "debug"
      API_URL: ${API_URL}

