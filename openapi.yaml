openapi: "3.0.3"
info:
  title: fortbyte
  version: "0.1.0"
  description: |
    Personal secrets manager with a hosted REST API.
    Supports JWT access tokens, refresh token rotation, and API key authentication.
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

security:
  - BearerAuth: []

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Server health check
      description: Returns server health status including database connectivity.
      tags: [system]
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Server is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      operationId: readinessCheck
      summary: Readiness check
      description: Simple liveness probe without database dependency.
      tags: [system]
      security: []
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready

  /auth/register:
    post:
      operationId: register
      summary: Register a new user
      description: Creates a new user account and returns access + refresh tokens.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      operationId: login
      summary: Login
      description: Authenticates a user and returns access + refresh tokens.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      operationId: refresh
      summary: Refresh tokens
      description: Exchanges a refresh token for a new access + refresh token pair (rotation).
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: The refresh token to exchange
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      summary: Logout
      description: Revokes all refresh tokens for the authenticated user.
      tags: [auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged_out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/api-keys:
    post:
      operationId: createAPIKey
      summary: Create API key
      description: |
        Creates a long-lived API key for programmatic access.
        The raw key is returned only once in this response.
      tags: [auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: A descriptive name for the API key
                expires_in_days:
                  type: integer
                  description: Number of days until the key expires (optional, no expiry if omitted)
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/api-keys/{keyID}:
    delete:
      operationId: deleteAPIKey
      summary: Delete API key
      description: Deletes an API key belonging to the authenticated user.
      tags: [auth]
      security:
        - BearerAuth: []
      parameters:
        - name: keyID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the API key to delete
      responses:
        "200":
          description: API key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Use a JWT access token (returned from register/login) or an API key prefix `fb_`.
        JWT tokens expire after 15 minutes; refresh via `/auth/refresh`.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, unhealthy]
        db:
          type: string
          enum: [up, down]

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: s3cretP@ss!

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token (15 min TTL)
        refresh_token:
          type: string
          description: Refresh token (7 day TTL)
        expires_in:
          type: integer
          description: Access token TTL in seconds
          example: 900

    CreateAPIKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Display name of the API key
        key:
          type: string
          description: The raw API key (shown only once)
          example: fb_a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp (null if no expiry)

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: auth_error
            message:
              type: string
              example: invalid credentials
